<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-dark: #0d0f1a;
        --bg-card: rgba(255, 255, 255, 0.05);
        --accent: #6c63ff;
        --accent-2: #48cfad;
        --text-primary: #f0f0f8;
        --text-secondary: #9a9ab0;
        --border: rgba(255, 255, 255, 0.1);
        --radius: 20px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: var(--bg-dark);
        background-image:
          radial-gradient(ellipse at 10% 20%, rgba(108, 99, 255, 0.15) 0%, transparent 50%),
          radial-gradient(ellipse at 90% 80%, rgba(72, 207, 173, 0.1) 0%, transparent 50%);
        font-family: 'Inter', sans-serif;
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px 60px;
      }

      /* ── Back Button ── */
      .back-btn {
        align-self: flex-start;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 10px 20px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        text-decoration: none;
        backdrop-filter: blur(10px);
        transition: color 0.3s, border-color 0.3s, transform 0.2s;
        margin-bottom: 40px;
        max-width: 900px;
        width: 100%;
      }

      .back-btn:hover {
        color: var(--text-primary);
        border-color: var(--accent);
        transform: translateX(-3px);
      }

      /* ── Card ── */
      #countryDetails {
        width: 100%;
        max-width: 700px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        backdrop-filter: blur(16px);
        overflow: hidden;
        animation: fadeIn 0.5s ease both;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Hero ── */
      .country-hero {
        position: relative;
        background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(72,207,173,0.1));
        padding: 40px 30px 30px;
        text-align: center;
        border-bottom: 1px solid var(--border);
      }

      .country-hero::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .country-hero img {
        width: 160px;
        height: 105px;
        object-fit: cover;
        border-radius: 10px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
        margin-bottom: 20px;
      }

      .country-hero h1 {
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 700;
        background: linear-gradient(135deg, #fff 40%, var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .continent-badge {
        display: inline-block;
        margin-top: 10px;
        padding: 4px 14px;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: rgba(108, 99, 255, 0.15);
        color: var(--accent);
        border: 1px solid rgba(108, 99, 255, 0.3);
      }

      /* ── Info Grid ── */
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
      }

      .info-item {
        background: var(--bg-dark);
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: background 0.3s;
      }

      .info-item:hover {
        background: rgba(255,255,255,0.04);
      }

      .info-item .icon-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--accent-2);
      }

      .info-item .value {
        font-size: 15px;
        font-weight: 500;
        color: var(--text-primary);
      }

      /* ── Loading State ── */
      .loading-state {
        text-align: center;
        padding: 80px 30px;
      }

      .spinner {
        width: 44px;
        height: 44px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-state p {
        color: var(--text-secondary);
        font-size: 14px;
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .info-grid { grid-template-columns: 1fr; }
        .country-hero img { width: 130px; height: 85px; }
      }
    </style>
  </head>
  <body>

    <a class="back-btn" onclick="window.history.back()" href="index.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to Catalog
    </a>

    <div id="countryDetails">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading country details…</p>
      </div>
    </div>

    <script>
      const API_URL = "https://countries-api-hsak.onrender.com/api/countries";
      const container = document.getElementById("countryDetails");
      const params = new URLSearchParams(window.location.search);
      const countryId = Number(params.get("id"));

      const INFO_FIELDS = [
        { key: "capital",    label: "Capital",    icon: "🏛️" },
        { key: "population", label: "Population", icon: "👥", format: (v) => v.toLocaleString() },
        { key: "language",   label: "Language",   icon: "🗣️" },
        { key: "area",       label: "Area",       icon: "📐", format: (v) => `${v.toLocaleString()} km²` },
        { key: "currency",   label: "Currency",   icon: "💰" },
        { key: "timezone",   label: "Timezone",   icon: "🕐" },
      ];

      async function loadCountry() {
        try {
          const response = await fetch(API_URL);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();

          const country = data.find((c) => c.id === countryId);
          if (!country) throw new Error("Country not found");

          document.title = `${country.name} — Country Details`;
          renderCountry(country);
        } catch (err) {
          container.innerHTML = `
            <div class="loading-state">
              <p style="color:#ff6b6b; font-size:16px;">⚠️ ${err.message}</p>
            </div>`;
          console.error(err);
        }
      }

      function renderCountry(country) {
        const infoItems = INFO_FIELDS.map(({ key, label, icon, format }) => {
          const raw = country[key];
          const value = raw !== undefined && raw !== null
            ? (format ? format(raw) : raw)
            : "—";
          return `
            <div class="info-item">
              <span class="icon-label">${icon} ${label}</span>
              <span class="value">${value}</span>
            </div>`;
        }).join("");

        container.innerHTML = `
          <div class="country-hero">
            <img src="${country.flag}" alt="Flag of ${country.name}" />
            <h1>${country.name}</h1>
            <span class="continent-badge">${country.continent}</span>
          </div>
          <div class="info-grid">
            ${infoItems}
          </div>
        `;
      }

      loadCountry();
    </script>
  </body>
</html>
